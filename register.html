{% extends "base.html" %}

{% block content %}
<div class="flex items-center justify-center min-h-[80vh]">
    <div class="w-full max-w-md bg-white p-8 sm:p-10 rounded-2xl card-shadow text-center">
        <div class="inline-block bg-purple-100 text-purple-700 text-xs font-bold px-2 py-1 rounded mb-4">
            STOCKER
        </div>
        <h2 class="text-2xl font-bold text-gray-800 mb-2">Create Account</h2>
        <p class="text-gray-500 mb-6 text-sm">Join Stocker and start trading today</p>

        <form method="POST" action="{{ url_for('register') }}">
            <div class="space-y-4">
                <!-- Role Selection -->
                <div class="text-left">
                    <label for="role" class="block text-sm font-medium text-gray-700 mb-1">Select Role</label>
                    <select id="role" name="role" required class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 transition duration-150">
                        <option value="Trader">Trader</option>
                        <option value="Admin">Admin</option>
                    </select>
                </div>
                
                <!-- Username -->
                <div class="text-left">
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                    <input type="text" id="username" name="username" required placeholder="jhansi rowlo"
                           class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 transition duration-150">
                </div>

                <!-- Email Address -->
                <div class="text-left">
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="123@gmail.com"
                           class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 transition duration-150">
                </div>

                <!-- Password -->
                <div class="text-left">
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" id="password" name="password" required placeholder="•••••"
                           class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 transition duration-150">
                </div>
            </div>

            <!-- Create Account Button (Green gradient) -->
            <button type="submit" class="w-full mt-6 bg-green-500 hover:bg-green-600 text-white font-semibold py-3 rounded-lg shadow-lg transition duration-300">
                CREATE ACCOUNT
            </button>
        </form>

        <p class="mt-6 text-sm text-gray-500">
            Already have an account? 
            <a href="{{ url_for('login') }}" class="text-purple-600 font-medium hover:text-purple-700 transition duration-150">Login here</a>
        </p>
    </div>
</div>
{% endblock %}
