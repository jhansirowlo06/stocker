{% extends "base.html" %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <h1 class="text-4xl font-bold text-gray-800 mb-6">View Traders</h1>

    <div class="bg-white p-6 rounded-xl shadow-lg">
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200">
                <thead>
                    <tr>
                        <th class="px-6 py-3 bg-purple-600 text-left text-xs font-semibold text-white uppercase tracking-wider rounded-tl-lg">TRADER ID</th>
                        <th class="px-6 py-3 bg-purple-600 text-left text-xs font-semibold text-white uppercase tracking-wider">USERNAME</th>
                        <th class="px-6 py-3 bg-purple-600 text-left text-xs font-semibold text-white uppercase tracking-wider">EMAIL</th>
                        <th class="px-6 py-3 bg-purple-600 text-left text-xs font-semibold text-white uppercase tracking-wider">PORTFOLIO VALUE</th>
                        <th class="px-6 py-3 bg-purple-600 text-center text-xs font-semibold text-white uppercase tracking-wider rounded-tr-lg">ACTION</th>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200">
                    {% for trader in traders %}
                    <tr class="hover:bg-gray-50">
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">{{ trader.id }}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">{{ trader.username }}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">{{ trader.email }}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-semibold text-green-600">{{ trader.portfolio_value }}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-center text-sm font-medium">
                            <button class="text-indigo-600 hover:text-indigo-900 transition duration-150">View Details</button>
                        </td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="5" class="px-6 py-4 text-center text-sm text-gray-500">
                            Total Traders: {{ total_traders }}
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
